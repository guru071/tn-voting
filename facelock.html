<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Face Lock - Login</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --radius: 16px;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 24px;
        }

        .media-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
            background-color: #111827;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #status {
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .warning { background-color: #FEF3C7; color: #D97706; }
        .success { background-color: #D1FAE5; color: #059669; }
        .error { background-color: #FEE2E2; color: #DC2626; }

        @media (max-width: 480px) {
            body {
                padding: 0;
                background-color: var(--card-bg);
                align-items: flex-start;
            }
            .app-container {
                max-width: 100%;
                min-height: 100vh;
                min-height: 100dvh;
                border-radius: 0;
                box-shadow: none;
                padding: 20px 15px;
            }
            .media-container {
                flex: 1;
                min-height: 300px;
                aspect-ratio: auto;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Face Unlock</h2>
        
        <div class="media-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div id="status" class="warning">Loading System...</div>
    </div>

    <script type="module" src="./js/facelock.js"></script>
</body>
</html>
