<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Face Lock - Register</title>
    <link rel="stylesheet" href="./css/facelock.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>

<body>

    <h2>Register Face ID</h2>
    <div class="toggle-container">
    <label class="switch">
        <input type="checkbox" id="autoCaptureToggle" checked>
        <span class="slider round"></span>
    </label>
    <button id="flipBtn">Flip Camera</button>
    <span class="toggle-label">Auto-Capture Face</span>
</div>
    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <img id="previewImg" style="display:none; width: 100%; max-width: 640px;" />
        <canvas id="canvas"></canvas>
        <div id="status" class="warning">Loading AI Models...</div>
        <button id="registerBtn" disabled>Capture Face</button>
    </div>

    <div class="nav-links">
    </div>
    <script type="module" src="./js/face_register.js"></script>
</body>

</html>
