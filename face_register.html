<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Face Lock - Register</title>
    <link rel="stylesheet" href="./css/facelock.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        #flipBtn {
            border-radius: 50px;
            margin-bottom: 20px;
        }
        .controls {
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h2>Register Face ID</h2>
    
    <div class="toggle-container">
        <button id="flipBtn">📷 Flip Camera</button>
        <label class="switch">
            <input type="checkbox" id="autoCaptureToggle" checked>
            <span class="slider round"></span>
        </label>
        <span class="toggle-label">Auto-Capture Face</span>
    </div>

    <div class="container">
        <video id="video" autoplay muted playsinline></video>
        <img id="previewImg" style="display:none; width: 100%; max-width: 640px;" />
        <canvas id="canvas"></canvas>
        
        <div id="status" class="warning">Loading AI Models...</div>
        
        <div class="controls">
            <button id="registerBtn" disabled>Capture Photo</button> 
            
            <button id="recaptureBtn" style="display: none;">Retake Photo</button>
            <button id="confirmBtn" style="display: none;">Confirm & Register</button>
        </div>
    </div>

    <div class="nav-links"></div>

    <script type="module" src="./js/face_regster.js"></script>
</body>

</html>
